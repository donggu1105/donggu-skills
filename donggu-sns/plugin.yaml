manifest_version: 1
name: donggu-sns
version: "2.6.0"
description: "Native publishing adapter with HMAC receipts, trusted later-turn approval, Maily confirmation, fixed webhook routing, and durable published_posts reconciliation. Claude publishing mutation is fail-closed; its bridge is preview-only."
author: "강동현 (donggu)"
kind: standalone
requires_env:
  - SNS_WEBHOOK_TOKEN
  - SUPABASE_URL
  - SUPABASE_SERVICE_KEY
provides_tools:
  - donggu_publishing_preview
  - donggu_publishing_approve
  - donggu_publishing_confirm_maily
  - donggu_publishing_dispatch
  - donggu_publishing_receipt_status
